<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Weather Pro</title>
    <link rel="stylesheet" href="ruhela.css">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Search City...">
                <button class="search-btn">🔍</button>
            </div>

            <div class="weather-info">
                <h2 class="city-name">Loading...</h2>
                <img src="" alt="icon" class="weather-icon">
                <h1 class="temp">--°C</h1>
                <p class="description">Please allow location</p>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <span>90 Min. Weather</span>
                    <p class="rain-prediction">Clear Sky</p>
                </div>
            </div>
        </div>
    </div>

    <script src="rajput.js"></script>
</body>
</html>
