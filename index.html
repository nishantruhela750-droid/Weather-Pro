<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Weather App</title>
    <link rel="stylesheet" href="ruhela.css">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <div class="search-box">
                <input type="text" id="cityInput" class="search-input" placeholder="Enter City Name...">
                <button id="searchBtn" class="search-btn">🔍</button>
            </div>
            <div class="weather-info">
                <h2 id="cityName" class="city-name">Detecting...</h2>
                <img id="weatherIcon" src="" alt="" class="weather-icon">
                <h1 id="tempDisplay" class="temp">--°C</h1>
                <p id="description" class="description">Waiting for location...</p>
            </div>
        </div>
    </div>
    <script src="rajput.js"></script>
</body>
</html>
