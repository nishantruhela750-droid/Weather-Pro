<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant's Weather App</title>
    <link rel="stylesheet" href="ruhela.css">
</head>
<body>

    <div class="app-container">
        <div class="header">
            <p id="region">Fetching Location...</p>
            <div class="location-row">
                <h2 id="cityName">---</h2>
                <button onclick="getMyLocation()" class="loc-btn">📍</button>
            </div>
        </div>

        <div class="main-weather">
            <h1 id="temp">--°</h1>
            <div class="aqi-badge" id="aqi-box">AQI --</div>
        </div>

        <div class="search-section">
            <input type="text" id="cityInput" placeholder="Search City...">
            <button onclick="getWeather()">🔍</button>
        </div>

        <div class="weather-banner">
            <span>90 Min. Weather: <strong id="mini-desc">--</strong></span>
            <button class="play-btn">▶</button>
        </div>

        <div class="sun-row">
            <span>today</span>
            <span id="sun-times">☀️ ↑ -- AM  ↓ -- PM</span>
        </div>

        <div class="hourly-forecast" id="forecastContainer">
            </div>
    </div>

    <script src="rajput.js"></script>
</body>
</html>
